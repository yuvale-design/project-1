<!-- Illustration: Tel Aviv skyline silhouette with sunset/sea -->
<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of the Tel Aviv skyline at sunset with the Mediterranean sea">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d2d3d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3a2d4d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#e29acc"/>
      <stop offset="60%" stop-color="#b8b5e8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b8b5e8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="160" fill="url(#skyGrad)"/>

  <!-- Sun/glow behind buildings -->
  <ellipse cx="640" cy="160" rx="190" ry="120" fill="url(#sun)" opacity="0.7"/>
  <circle cx="640" cy="135" r="34" fill="#e29acc" opacity="0.65"/>

  <!-- Stars -->
  <circle cx="120" cy="40" r="1.2" fill="#f5f3ff" opacity="0.9"/>
  <circle cx="220" cy="25" r="0.9" fill="#f5f3ff" opacity="0.7"/>
  <circle cx="340" cy="50" r="1.1" fill="#f5f3ff" opacity="0.8"/>
  <circle cx="480" cy="20" r="0.8" fill="#f5f3ff" opacity="0.7"/>
  <circle cx="80" cy="70" r="0.9" fill="#f5f3ff" opacity="0.6"/>
  <circle cx="280" cy="80" r="0.7" fill="#f5f3ff" opacity="0.5"/>

  <!-- Palm trees (left) -->
  <g transform="translate(40,90)">
    <rect x="-1.5" y="0" width="3" height="60" fill="#1a1a2e"/>
    <path d="M0 0 Q-22 -6 -32 -22 M0 0 Q-18 -18 -30 -30 M0 0 Q-4 -22 -6 -36 M0 0 Q14 -22 28 -28 M0 0 Q22 -8 34 -18 M0 0 Q18 -16 26 -32" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <g transform="translate(85,100)">
    <rect x="-1" y="0" width="2" height="50" fill="#1a1a2e"/>
    <path d="M0 0 Q-16 -4 -24 -16 M0 0 Q-12 -14 -22 -22 M0 0 Q-2 -16 -4 -26 M0 0 Q10 -16 22 -22 M0 0 Q16 -6 26 -14 M0 0 Q14 -12 20 -24" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Skyline buildings -->
  <g fill="#1a1a2e">
    <!-- Round-corner buildings (Bauhaus aesthetic) -->
    <rect x="140" y="100" width="38" height="60" rx="2"/>
    <rect x="185" y="80" width="48" height="80" rx="3"/>
    <rect x="240" y="90" width="30" height="70" rx="2"/>

    <!-- Mid-rise -->
    <rect x="280" y="70" width="40" height="90" rx="3"/>
    <rect x="325" y="85" width="34" height="75" rx="2"/>
    <rect x="365" y="60" width="48" height="100" rx="4"/>

    <!-- Tall tower (Azrieli-style) -->
    <path d="M420 30 L420 160 L444 160 L444 30 Z"/>
    <circle cx="432" cy="30" r="12"/>

    <!-- More towers -->
    <rect x="455" y="55" width="36" height="105" rx="3"/>
    <rect x="498" y="40" width="42" height="120" rx="4"/>

    <!-- Triangular tower -->
    <path d="M546 160 L568 50 L590 160 Z"/>

    <!-- Round tower (Migdal Shalom style) -->
    <rect x="600" y="60" width="42" height="100" rx="6"/>
    <rect x="606" y="50" width="30" height="14" rx="4"/>

    <rect x="650" y="78" width="36" height="82" rx="3"/>
    <rect x="694" y="95" width="30" height="65" rx="2"/>
    <rect x="730" y="70" width="44" height="90" rx="4"/>
  </g>

  <!-- Lit windows (random scattered) -->
  <g fill="#f4a724" opacity="0.85">
    <rect x="148" y="115" width="3" height="3"/>
    <rect x="158" y="125" width="3" height="3"/>
    <rect x="168" y="135" width="3" height="3"/>
    <rect x="195" y="95" width="3" height="3"/>
    <rect x="210" y="110" width="3" height="3"/>
    <rect x="220" y="125" width="3" height="3"/>
    <rect x="290" y="85" width="3" height="3"/>
    <rect x="300" y="105" width="3" height="3"/>
    <rect x="310" y="125" width="3" height="3"/>
    <rect x="375" y="75" width="3" height="3"/>
    <rect x="390" y="95" width="3" height="3"/>
    <rect x="400" y="120" width="3" height="3"/>
    <rect x="425" y="50" width="2" height="2"/>
    <rect x="425" y="75" width="2" height="2"/>
    <rect x="425" y="105" width="2" height="2"/>
    <rect x="425" y="135" width="2" height="2"/>
    <rect x="437" y="55" width="2" height="2"/>
    <rect x="437" y="90" width="2" height="2"/>
    <rect x="437" y="120" width="2" height="2"/>
    <rect x="465" y="75" width="3" height="3"/>
    <rect x="475" y="95" width="3" height="3"/>
    <rect x="485" y="120" width="3" height="3"/>
    <rect x="508" y="55" width="3" height="3"/>
    <rect x="520" y="80" width="3" height="3"/>
    <rect x="530" y="110" width="3" height="3"/>
    <rect x="610" y="80" width="3" height="3"/>
    <rect x="625" y="105" width="3" height="3"/>
    <rect x="660" y="95" width="3" height="3"/>
    <rect x="675" y="125" width="3" height="3"/>
    <rect x="740" y="85" width="3" height="3"/>
    <rect x="755" y="110" width="3" height="3"/>
    <rect x="765" y="135" width="3" height="3"/>
  </g>

  <!-- Sea/horizon line -->
  <rect x="0" y="158" width="800" height="62" fill="url(#seaGrad)"/>
  <!-- Sea sparkles -->
  <g fill="#b8b5e8" opacity="0.4">
    <ellipse cx="100" cy="178" rx="15" ry="0.6"/>
    <ellipse cx="250" cy="186" rx="20" ry="0.7"/>
    <ellipse cx="400" cy="180" rx="14" ry="0.6"/>
    <ellipse cx="550" cy="192" rx="22" ry="0.8"/>
    <ellipse cx="700" cy="184" rx="16" ry="0.6"/>
  </g>
  <g fill="#e29acc" opacity="0.5">
    <ellipse cx="640" cy="170" rx="40" ry="1"/>
    <ellipse cx="640" cy="180" rx="32" ry="0.8"/>
  </g>
</svg>
