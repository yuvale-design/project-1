name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/youthful-feynman-h753bh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage publishable files
        run: |
          mkdir -p _site
          cp index.html _site/
          # Lead-magnet PDF (free, 50 phrases)
          cp $(ls -1t Street_Hebrew_Survival_Guide_*.pdf | head -1) _site/
          cp _site/Street_Hebrew_Survival_Guide_*.pdf _site/guide.pdf
          # Full course PDF (paid; obscure filename so the URL doesn't leak)
          if ls course-*.pdf 1>/dev/null 2>&1; then
            cp course-*.pdf _site/
          fi
          # Custom domain — GitHub Pages reads CNAME from the deployed site
          cp CNAME _site/
          ls -la _site/

      - name: Configure Pages (auto-enables if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
